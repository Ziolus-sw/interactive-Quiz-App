<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Game</title>
  <link rel="stylesheet" href="style1.css" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />

</head>
<body>
  <div class="container">
    <div class="screen active" id="start-screen">
      <h1>Quiz Time!</h1>
      <p>Test your knowledge with these fun questions</p>
      <button id="start-btn">Start Quiz</button>
    </div>
    <div class="screen " id="quiz-screen">
      <div class="quiz-header">
        <h2 id="question-text">Question goes here</h2>
        <div class="quiz-info">
          <p>
            Question <span id="current-question"></span> of <span id="total-questions"></span>
          </p>
          <p>Score: <span id="score">0</span></p>
        </div>
      </div>

      <div id="answers-container" class="answers-container">


        <!-- Answer buttons will be insterted here from our js code later at some point -->
      </div>
<div id="answer-status" class="answer-status" aria-live="polite"></div>
      <div class="back-for-progress">
        <div class="back-btn">
          <i class="ri-arrow-left-long-line"></i>
        </div>

        <div class="progress-bar">
          <div id="progress" class="progress">
          </div>
        </div>

        <div class="forward-btn"><i class="ri-arrow-right-long-line"></i>
        </div>

      </div>

    </div>
    <div id="result-screen" class="screen ">
      <h1>Quiz Results</h1>
      <div class="result-info">
        <p>You scored <span id="final-score">0</span> out of <span id="max-score">5</span></p>

        <div id="result-message">Good job!</div>
      </div>
      <button id="restart-btn">Restart Quiz</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
